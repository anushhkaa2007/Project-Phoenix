<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Project Phoenix</title>

  </head>
  <body>

    <div class="container">
      <h1>Project Phoenix</h1>
      <p>Build yourself while building your software.</p>

        </div>

        <div class="card">

          <p>2 out of 15 days completed.</p>

        </div>

      </div>

    </div>

    <script src="script.js"></script>
