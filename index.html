<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Project Phoenix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">
      <h1>Project Phoenix</h1>
      <p>Build yourself while building your software.</p>
      <button onclick="handleBegin()">Begin Day 1</button>
    </div>

    <div class="dashboard">

      <div class="top-bar">
        <p class="greeting">Good Morning, Anushka! ☀️</p>
        <p class="day-counter">Day 3 of 15</p>
        <p class="date" id="today-date"></p>
      </div>

      <div class="cards">

        <div class="card task-card">
  <h2>Today's Mission</h2>

  <div class="task-input-row">
    <input type="text" id="task-input" placeholder="Type a new task..." />
    <button onclick="addTask()">Add Task</button>
  </div>

  <ul id="task-list"></ul>
</div>

        <div class="card">
  <h2>Progress</h2>
  <p id="progress-text">0 out of 0 tasks completed.</p>
</div>

        <div class="card">
          <h2>Quote of the Day</h2>
          <p>"The secret of getting ahead is getting started."</p>
        </div>

      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
